name: osv-scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "30 12 * * 1" # weekly: Mondays 12:30 UTC

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=./pubspec.lock
